<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 250px;
      font-family: Arial, sans-serif;
      padding: 12px;
      margin: 0;
    }
    h3 { margin-top: 0; color: #333; }
    input {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      margin-bottom: 8px;
    }
    button {
      width: 100%;
      padding: 8px;
      background-color: #cc0000;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background-color: #990000; }
    ul { padding-left: 20px; margin-top: 10px; max-height: 120px; overflow-y: auto; }
  </style>
</head>
<body>
  <h3>YT Stealth Blocker</h3>
  <input type="text" id="channelInput" placeholder="Enter channel name..." />
  <button id="addBtn">Block Channel</button>

  <h4>Blocked Channels</h4>
  <ul id="blockList"></ul>

  <script src="popup.js"></script>
</body>
</html>
